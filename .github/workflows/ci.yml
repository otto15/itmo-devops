name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    name: Backend - Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garage-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests with coverage
        run: ./gradlew test jacocoTestReport copyDependencies --build-cache --parallel

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: garage-backend/build/reports/tests/test/
          retention-days: 7

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco
          path: |
            garage-backend/build/reports/jacoco/
            garage-backend/build/classes/
            garage-backend/build/dependency/
          retention-days: 1

  backend-build:
    name: Backend - Build
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: garage-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew compileKotlin --build-cache --parallel

  frontend-test:
    name: Frontend - Test
    runs-on: ubuntu-latest
    needs: backend-build
    defaults:
      run:
        working-directory: garage-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'garage-frontend/package-lock.json'

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install --no-package-lock

      - name: Run unit tests with coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: garage-frontend/coverage/
          retention-days: 1

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest
    needs: frontend-test
    defaults:
      run:
        working-directory: garage-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'garage-frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download JaCoCo report
        uses: actions/download-artifact@v4
        with:
          name: backend-jacoco
          path: garage-backend/build/

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: garage-frontend/coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.organization=otto15
            -Dsonar.projectKey=otto15_itmo-devops
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=600

  docker-publish:
    name: Docker - Publish to YCR (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [frontend-build, sonar]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: garage-backend
            dockerfile: garage-backend/Dockerfile
            context: garage-backend
          - image: garage-frontend
            dockerfile: garage-frontend/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Login to Yandex Container Registry
        run: |
          echo '${{ secrets.YC_KEY }}' > /tmp/key.json
          cat /tmp/key.json | docker login cr.yandex --username json_key --password-stdin

      - name: Build Docker image
        run: |
          docker build -f ${{ matrix.dockerfile }} \
            -t cr.yandex/crp73fh09ihdevr61ugo/${{ matrix.image }}:latest \
            -t cr.yandex/crp73fh09ihdevr61ugo/${{ matrix.image }}:${{ github.sha }} \
            ${{ matrix.context }}

      - name: Push Docker images
        run: |
          docker push cr.yandex/crp73fh09ihdevr61ugo/${{ matrix.image }}:latest
          docker push cr.yandex/crp73fh09ihdevr61ugo/${{ matrix.image }}:${{ github.sha }}
