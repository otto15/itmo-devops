name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    name: Backend — Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garage-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test --tests "com.garage.service.*" --build-cache --parallel

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: garage-backend/build/reports/tests/test/
          retention-days: 7

  backend-build:
    name: Backend — Build
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: garage-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew compileKotlin --build-cache --parallel

  backend-docker:
    name: Backend - Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: backend-build
    defaults:
      run:
        working-directory: garage-backend

    steps:
      - uses: actions/checkout@v4

      - name: Login to Yandex Container Registry
        run: echo "${{ secrets.YC_KEY }}" | docker login cr.yandex --username json_key --password-stdin

      - name: Build Docker image
        run: docker build -t cr.yandex/crp73fh09ihdevr61ugo/garage-backend:latest -t cr.yandex/crp73fh09ihdevr61ugo/garage-backend:${{ github.sha }} .

      - name: Push Docker images
        run: |
          docker push cr.yandex/crp73fh09ihdevr61ugo/garage-backend:latest
          docker push cr.yandex/crp73fh09ihdevr61ugo/garage-backend:${{ github.sha }}

  frontend-test:
    name: Frontend - Test
    runs-on: ubuntu-latest
    needs: backend-build
    
    defaults:
      run:
        working-directory: garage-frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'garage-frontend/package-lock.json'

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install --no-package-lock

      - name: Run unit tests
        run: |
          npm run test:run
        env:
          CI: true

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest
    needs: frontend-test
    defaults:
      run:
        working-directory: garage-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'garage-frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  frontend-docker:
    name: Frontent - Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: frontend-build
    defaults:
      run:
        working-directory: garage-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Login to Yandex Container Registry
        run: echo "${{ secrets.YC_KEY }}" | docker login cr.yandex --username json_key --password-stdin

      - name: Build Docker image
        run: docker build -t cr.yandex/crp73fh09ihdevr61ugo/garage-frontend:latest -t cr.yandex/crp73fh09ihdevr61ugo/garage-frontend:${{ github.sha }} .

      - name: Push Docker images
        run: |
          docker push cr.yandex/crp73fh09ihdevr61ugo/garage-frontend:latest
          docker push cr.yandex/crp73fh09ihdevr61ugo/garage-frontend:${{ github.sha }}
