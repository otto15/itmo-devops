name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'k8s/app/backend/deployment.yaml'
      - 'k8s/app/frontend/deployment.yaml'
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  backend-test:
    name: Backend - Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garage-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests with coverage
        run: ./gradlew test jacocoTestReport copyDependencies --build-cache --parallel

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: garage-backend/build/reports/tests/test/
          retention-days: 7

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco
          path: |
            garage-backend/build/reports/jacoco/
            garage-backend/build/classes/
            garage-backend/build/dependency/
          retention-days: 1

  backend-build:
    name: Backend - Build
    runs-on: ubuntu-latest
    needs: backend-test
    defaults:
      run:
        working-directory: garage-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew compileKotlin --build-cache --parallel

  frontend-test:
    name: Frontend - Test
    runs-on: ubuntu-latest
    needs: backend-build
    defaults:
      run:
        working-directory: garage-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'garage-frontend/package-lock.json'

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install --no-package-lock

      - name: Run unit tests with coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: garage-frontend/coverage/
          retention-days: 1

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest
    needs: frontend-test
    defaults:
      run:
        working-directory: garage-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'garage-frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download JaCoCo report
        uses: actions/download-artifact@v4
        with:
          name: backend-jacoco
          path: garage-backend/build/

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: garage-frontend/coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.organization=otto15
            -Dsonar.projectKey=otto15_itmo-devops
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=600

  bump-image-tag:
    name: GitOps - Bump image tag for Argo CD
    runs-on: ubuntu-latest
    needs: docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in k8s manifests
        run: |
          SHA_TAG="${GITHUB_SHA}"
          sed -i "s|garage-backend:.*|garage-backend:${SHA_TAG}|g" k8s/app/backend/deployment.yaml
          sed -i "s|garage-frontend:.*|garage-frontend:${SHA_TAG}|g" k8s/app/frontend/deployment.yaml

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git add k8s/app/backend/deployment.yaml k8s/app/frontend/deployment.yaml
          git commit -m "ci(gitops): bump images to ${GITHUB_SHA}"
          git push

  docker-publish:
    name: Docker - Publish to YCR (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [frontend-build, sonar]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: garage-backend
            dockerfile: garage-backend/Dockerfile
            context: garage-backend
          - image: garage-frontend
            dockerfile: garage-frontend/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Login to Yandex Container Registry
        run: |
          echo '${{ secrets.YC_KEY }}' > /tmp/key.json
          cat /tmp/key.json | docker login cr.yandex --username json_key --password-stdin

      - name: Build Docker image
        run: |
          docker build -f ${{ matrix.dockerfile }} \
            -t cr.yandex/crp73fh09ihdevr61ugo/${{ matrix.image }}:latest \
            -t cr.yandex/crp73fh09ihdevr61ugo/${{ matrix.image }}:${{ github.sha }} \
            ${{ matrix.context }}

      - name: Push Docker images
        run: |
          docker push cr.yandex/crp73fh09ihdevr61ugo/${{ matrix.image }}:latest
          docker push cr.yandex/crp73fh09ihdevr61ugo/${{ matrix.image }}:${{ github.sha }}

  notify:
    name: Telegram - Notify pipeline status
    runs-on: ubuntu-latest
    needs: [backend-test, backend-build, frontend-test, frontend-build, docker-publish]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Send job statuses to Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          EVENT: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BT: ${{ needs.backend-test.result }}
          BB: ${{ needs.backend-build.result }}
          FT: ${{ needs.frontend-test.result }}
          FB: ${{ needs.frontend-build.result }}
          DP: ${{ needs.docker-publish.result }}
        run: bash .github/scripts/telegram-notify.sh
