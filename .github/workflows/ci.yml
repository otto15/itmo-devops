name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-build:
    name: Backend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garage-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: ./gradlew bootJar --no-daemon -x test

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: garage-backend/build/libs/*.jar
          retention-days: 1

  backend-test:
    name: Backend — Test
    runs-on: ubuntu-latest
    needs: backend-build
    defaults:
      run:
        working-directory: garage-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: garage-backend/build/reports/tests/test/
          retention-days: 7
