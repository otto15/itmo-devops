---
- name: Install Docker and tools
  hosts: vm
  become: true

  pre_tasks:
    - name: Wait for SSH
      wait_for_connection:
        delay: 10
        timeout: 120
  tasks:
    - name: Install prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - apt-transport-https
          - conntrack
          - socat
          - wget
        state: present

    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: Add Docker apt repository
      shell: |
        echo \
          "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
          https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
          tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Update apt cache
      shell:
        cmd: apt-get update

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Enable and start Docker service
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Add devops user to docker group
      user:
        name: devops
        groups: docker
        append: true

    - name: Download kubectl
      get_url:
        url: "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: Download Minikube
      get_url:
        url: "https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64"
        dest: /usr/local/bin/minikube
        mode: '0755'

    - name: Allow unprivileged bind to port 80+ (for kubectl port-forward as devops)
      sysctl:
        name: net.ipv4.ip_unprivileged_port_start
        value: '80'
        state: present
        sysctl_file: /etc/sysctl.d/99-unprivileged-ports.conf
        reload: true

    # Ubuntu's guided LVM install leaves the root LV at ~half the volume group.
    # The k8s + monitoring stack needs the space, so grow the root LV/FS to use
    # all free extents (no-op if nothing is free). Assumes the default
    # ubuntu-vg/ubuntu-lv naming.
    - name: Grow root LV to use all free VG space
      shell: |
        set -e
        free=$(vgs --noheadings -o vg_free --units b ubuntu-vg 2>/dev/null | tr -dc 0-9)
        if [ -n "$free" ] && [ "$free" -gt 0 ]; then
          lvextend -l +100%FREE /dev/ubuntu-vg/ubuntu-lv
          resize2fs /dev/ubuntu-vg/ubuntu-lv
          echo grown
        else
          echo nothing-to-grow
        fi
      register: lv_grow
      changed_when: "'grown' in lv_grow.stdout"
      failed_when: false

