---
- name: Start Minikube and deploy Garage
  hosts: vm
  become: false
  vars:
    registry: cr.yandex/crp73fh09ihdevr61ugo
    kubeconfig: /home/devops/.kube/config

  tasks:
    - name: Delete old Minikube cluster
      shell: minikube delete
      ignore_errors: true

    - name: Start Minikube
      shell: minikube start --driver=docker --cpus=2 --memory=3500

    - name: Enable metrics-server (for HPA)
      shell: minikube addons enable metrics-server

    # Retries guard against transient TLS/network flakes reaching cr.yandex.
    - name: Create k8s directories on remote
      file:
        path: "/home/devops/k8s/{{ item }}"
        state: directory
        owner: devops
      loop:
        - app
        - app/backend
        - app/frontend
        - app/database
        - monitoring

    - name: Copy Kubernetes manifests
      copy:
        src: "{{ playbook_dir }}/../k8s/"
        dest: "/home/devops/k8s/"
        owner: devops

    # --- Monitoring: plain manifests, no Helm (Prometheus + Grafana) ---
    - name: Create monitoring namespace
      shell: minikube kubectl -- create namespace monitoring --dry-run=client -o yaml | minikube kubectl -- apply -f -

    - name: Ensure ansible files directory exists on remote
      file:
        path: "/home/devops/ansible/files"
        state: directory
        owner: devops

    - name: Copy Grafana dashboard JSON
      copy:
        src: "{{ playbook_dir }}/files/grafana-dashboard.json"
        dest: "/home/devops/ansible/files/grafana-dashboard.json"
        owner: devops

    - name: Create Grafana dashboard ConfigMap (mounted into Grafana)
      shell: |
        minikube kubectl -- create configmap grafana-dashboard \
          --from-file=garage.json=/home/devops/ansible/files/grafana-dashboard.json \
          --namespace monitoring \
          --dry-run=client -o yaml | minikube kubectl -- apply -f -

    - name: Deploy Prometheus + Grafana (manifests)
      shell: minikube kubectl -- apply -f /home/devops/k8s/monitoring/

    - name: Wait for Prometheus rollout
      shell: minikube kubectl -- rollout status deploy/prometheus -n monitoring --timeout=180s

    - name: Wait for Grafana rollout
      shell: minikube kubectl -- rollout status deploy/grafana -n monitoring --timeout=180s

    - name: Create application namespace (garage-app)
      shell: minikube kubectl -- create namespace garage-app --dry-run=client -o yaml | minikube kubectl -- apply -f -

    - name: Create YCR image pull secret
      shell: |
        minikube kubectl -- create secret docker-registry ycr-secret \
          --docker-server=cr.yandex \
          --docker-username=iam \
          --docker-password="{{ lookup('env', 'YC_TOKEN') }}" \
          --namespace garage-app \
          --dry-run=client -o yaml | minikube kubectl -- apply -f -

    - name: Install Argo CD
      shell: |
        minikube kubectl -- create namespace argocd --dry-run=client -o yaml | minikube kubectl -- apply -f -
        minikube kubectl -- apply -n argocd --server-side -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

    - name: Wait for Argo CD to be ready
      shell: minikube kubectl -- rollout status deploy/argocd-server -n argocd --timeout=600s

    - name: Copy Argo CD application manifest
      copy:
        src: "{{ playbook_dir }}/files/argocd-app.yaml"
        dest: "/home/devops/ansible/files/argocd-app.yaml"
        owner: devops

    - name: Apply Argo CD application
      shell: minikube kubectl -- apply -f /home/devops/ansible/files/argocd-app.yaml

    # --- LAN access via systemd-managed port-forward ---
    - name: Install port-forward script
      become: true
      tags: portforward
      copy:
        src: "{{ playbook_dir }}/files/garage-portforward.sh"
        dest: /usr/local/bin/garage-portforward.sh
        mode: "0755"

    - name: Install port-forward systemd unit
      become: true
      tags: portforward
      copy:
        src: "{{ playbook_dir }}/files/garage-portforward.service"
        dest: /etc/systemd/system/garage-portforward.service

    - name: Enable and (re)start port-forward service
      become: true
      tags: portforward
      systemd:
        name: garage-portforward
        enabled: true
        state: restarted
        daemon_reload: true

    - name: Get pods status
      shell: minikube kubectl -- get pods -A
      register: pods

    - name: Get HPA status
      shell: minikube kubectl -- get hpa -n garage-app
      register: hpa

    - name: Deployment summary
      debug:
        msg:
          - "============================================="
          - "DEPLOYMENT COMPLETE"
          - ""
          - "Pods:"
          - "{{ pods.stdout_lines }}"
          - ""
          - "HPA:"
          - "{{ hpa.stdout_lines }}"
          - ""
          - "LAN access (from any host on the network):"
          - "  Frontend:    http://{{ inventory_hostname }}"
          - "  Backend API: http://{{ inventory_hostname }}:8081/cars"
          - "  Grafana:     http://{{ inventory_hostname }}:3000  (admin/admin)"
          - "  Prometheus:  http://{{ inventory_hostname }}:9090"
          - "  Argo CD:     https://{{ inventory_hostname }}:8443  (admin / see argocd-initial-admin-secret)"
          - "============================================="
