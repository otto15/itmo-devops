services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: garage
      POSTGRES_USER: garage
      POSTGRES_PASSWORD: garage
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garage -d garage"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db:
        condition: service_healthy
