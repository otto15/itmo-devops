spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/garage
    username: ${DB_USERNAME:garage}
    password: ${DB_PASSWORD:garage}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: garage-backend
    distribution:
      # publish histogram buckets for HTTP timings so Prometheus/Grafana can
      # compute latency percentiles (p90/p95/p99) via histogram_quantile()
      percentiles-histogram:
        "[http.server.requests]": true
      slo:
        "[http.server.requests]": 25ms,50ms,100ms,200ms,500ms,1s,2s
  prometheus:
    metrics:
      export:
        enabled: true
