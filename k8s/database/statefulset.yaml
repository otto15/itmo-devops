apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  namespace: garage-app
  labels:
    app: garage
    tier: database
spec:
  serviceName: db
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      automountServiceAccountToken: false
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: garage
            - name: POSTGRES_USER
              value: garage
            - name: POSTGRES_PASSWORD
              value: garage
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
              ephemeral-storage: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "512Mi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "garage", "-d", "garage"]
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi