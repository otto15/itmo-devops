apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: garage
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: cr.yandex/crp73fh09ihdevr61ugo/garage-backend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://db:5432/garage
            - name: SPRING_DATASOURCE_USERNAME
              value: garage
            - name: SPRING_DATASOURCE_PASSWORD
              value: garage
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"