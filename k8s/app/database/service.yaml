apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: garage-app
  labels:
    app: garage
    tier: database
spec:
  # Headless service: gives the StatefulSet stable DNS (db, db-0.db) and lets
  # the backend connect via jdbc:postgresql://db:5432/garage.
  clusterIP: None
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
