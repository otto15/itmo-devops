sonar.projectName=Garage
sonar.projectVersion=1.0

sonar.sources=garage-backend/src/main/kotlin,garage-frontend/src
sonar.tests=garage-backend/src/test/kotlin,garage-frontend/src/test
sonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/coverage/**,**/generated/**,garage-frontend/src/test/**,garage-frontend/src/api/generated/**
sonar.test.exclusions=**/node_modules/**

sonar.java.source=21
sonar.java.binaries=garage-backend/build/classes
sonar.java.libraries=garage-backend/build/dependency/*.jar
sonar.sourceEncoding=UTF-8

sonar.coverage.jacoco.xmlReportPaths=garage-backend/build/reports/jacoco/test/jacocoTestReport.xml
sonar.javascript.lcov.reportPaths=garage-frontend/coverage/lcov.info

sonar.coverage.exclusions=\
  **/generated/**,\
  garage-backend/src/main/kotlin/com/garage/GarageApplication.kt,\
  garage-backend/src/main/kotlin/com/garage/config/**,\
  garage-frontend/src/main.jsx,\
  garage-frontend/src/api/**
