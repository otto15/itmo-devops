services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: garage
      POSTGRES_USER: garage
      POSTGRES_PASSWORD: garage
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garage -d garage"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - garage-net

  backend:
    image: cr.yandex/crp73fh09ihdevr61ugo/garage-backend:latest
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db:
        condition: service_healthy
    networks:
      - garage-net

  frontend:
    image: cr.yandex/crp73fh09ihdevr61ugo/garage-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - garage-net

networks:
  garage-net:
    driver: bridge
