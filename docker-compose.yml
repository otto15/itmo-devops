services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: garage
      POSTGRES_USER: garage
      POSTGRES_PASSWORD: garage
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garage -d garage"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./garage-backend
    image: cr.yandex/crp73fh09ihdevr61ugo/garage-backend:latest
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build:
      context: .
      dockerfile: garage-frontend/Dockerfile
    image: cr.yandex/crp73fh09ihdevr61ugo/garage-frontend:latest
    ports:
      - "8888:80"
